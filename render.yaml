services:
  - type: web
    name: customer-support-ai
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Secrets are set in the Render dashboard, never committed here.
      - key: GOOGLE_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Set this to the deployed Vercel URL once the frontend is live.
      - key: ALLOWED_ORIGINS
        sync: false
